<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient box with rounded corners -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="1024" height="1024" rx="256" fill="url(#bgGradient)"/>

  <!-- Lucide Dumbbell icon - Exact design from lucide-react -->
  <!-- Lucide icons are 24x24, scale to ~400px for good visibility -->
  <!-- Transform: translate to center (512,512), then scale up -->
  <g transform="translate(512, 512) scale(17)">
    <g transform="translate(-12, -12)">
